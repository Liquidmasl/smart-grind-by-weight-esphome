################################################################################
# automations.yaml — scripts, sensor callbacks, auto-grind, screen refresh
################################################################################

# ── Globals for UI state ──────────────────────────────────────────────────────
globals:
  - id: active_profile
    type: int
    restore_value: true
    initial_value: "0"

  - id: auto_grind_enabled
    type: bool
    restore_value: true
    initial_value: "true"

  - id: return_on_removal_enabled
    type: bool
    restore_value: true
    initial_value: "true"

  - id: auto_grind_last_trigger_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: auto_grind_trigger_weight
    type: float
    restore_value: false
    initial_value: "0.0"

  # Display dim / wake state
  - id: display_brightness_pct
    type: float
    restore_value: true
    initial_value: "100.0"

  - id: display_auto_off_s
    type: int
    restore_value: true
    initial_value: "120"      # 0 disables auto-off

  - id: last_touch_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: display_dimmed
    type: bool
    restore_value: false
    initial_value: "false"

# ── HA-exposed numbers (writable from dashboard / automations) ────────────────
number:
  - platform: template
    name: "Target Weight (g)"
    id: num_target_weight
    min_value: 5
    max_value: 1000
    step: 0.1
    unit_of_measurement: g
    mode: box
    restore_value: true
    initial_value: 18.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_target_weight(x);

  - platform: template
    name: "Target Time (s)"
    id: num_target_time
    min_value: 0.5
    max_value: 25
    step: 0.1
    unit_of_measurement: s
    mode: box
    restore_value: true
    initial_value: 10.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_target_time_s(x);

  - platform: template
    name: "Motor Latency (ms)"
    id: num_motor_latency
    min_value: 30
    max_value: 300
    step: 1
    unit_of_measurement: ms
    mode: box
    restore_value: false
    optimistic: true
    set_action:
      then:
        - lambda: id(grind_ctrl).set_motor_latency_ms(x);

  - platform: template
    name: "Calibration Factor"
    id: num_cal_factor
    min_value: -50000
    max_value: 50000
    step: 1
    mode: box
    restore_value: false
    optimistic: true
    set_action:
      then:
        - lambda: id(grind_ctrl).set_cal_factor(x);

  - platform: template
    name: "Freshness Hours"
    id: num_freshness_hours
    min_value: 0.5
    max_value: 72
    step: 0.5
    unit_of_measurement: h
    mode: box
    restore_value: true
    initial_value: 8.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_freshness_hours(x);

  - platform: template
    name: "Purge Amount (g)"
    id: num_purge_amount
    min_value: 0.1
    max_value: 2.5
    step: 0.1
    unit_of_measurement: g
    mode: box
    restore_value: true
    initial_value: 1.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_chute_amount_g(x);

  - platform: template
    name: "Calibration Reference Weight (g)"
    id: num_cal_reference
    min_value: 1
    max_value: 1000
    step: 0.1
    unit_of_measurement: g
    mode: box
    restore_value: true
    initial_value: 100.0
    optimistic: true

  # ── Screen timeout ─────────────────────────────────────────────────────────
  # Seconds of touchscreen idle before we lvgl.pause (screen goes black).
  # 0 disables the auto-off. Touching the panel resumes it.
  - platform: template
    name: "Screen Timeout"
    id: screen_timeout
    optimistic: true
    min_value: 0
    max_value: 1800
    step: 10
    initial_value: 120
    restore_value: true
    unit_of_measurement: s
    mode: box

# ── HA-exposed selects ────────────────────────────────────────────────────────
select:
  - platform: template
    name: "Grind Mode"
    id: sel_grind_mode
    options:
      - "Weight"
      - "Time"
    restore_value: true
    initial_option: "Weight"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            int m = (x == "Time") ? 1 : 0;
            id(grind_ctrl).set_grind_mode(m);

  - platform: template
    name: "Chute Mode"
    id: sel_chute_mode
    options:
      - "Prime"
      - "Purge"
    restore_value: true
    initial_option: "Purge"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            int m = (x == "Purge") ? 1 : 0;
            id(grind_ctrl).set_chute_mode(m);

# ── HA-exposed buttons ────────────────────────────────────────────────────────
button:
  - platform: template
    name: "Tare Scale"
    on_press:
      then:
        - lambda: id(grind_ctrl).request_tare();

  - platform: template
    name: "Start Grind"
    on_press:
      then:
        - lambda: |-
            if (id(sel_grind_mode).state == "Weight")
              id(grind_ctrl).start_grind_weight(id(num_target_weight).state);
            else
              id(grind_ctrl).start_grind_time(id(num_target_time).state);

  - platform: template
    name: "Stop Grind"
    on_press:
      then:
        - lambda: id(grind_ctrl).stop_grind();

  - platform: template
    name: "Additional Pulse"
    on_press:
      then:
        - lambda: id(grind_ctrl).start_additional_pulse();

  - platform: template
    name: "Continue from Purge"
    on_press:
      then:
        - lambda: id(grind_ctrl).continue_from_purge();

  - platform: template
    name: "Start Calibration"
    on_press:
      then:
        - lambda: |-
            id(grind_ctrl).start_calibration(id(num_cal_reference).state);

  - platform: template
    name: "Start Autotune"
    on_press:
      then:
        - lambda: id(grind_ctrl).start_autotune();

# ── HA-exposed switches ───────────────────────────────────────────────────────
switch:
  - platform: template
    name: "Auto Grind on Cup"
    id: sw_auto_grind
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      then:
        - globals.set:
            id: auto_grind_enabled
            value: "true"
    turn_off_action:
      then:
        - globals.set:
            id: auto_grind_enabled
            value: "false"

  - platform: template
    name: "Return on Removal"
    id: sw_return_on_removal
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    turn_on_action:
      then:
        - globals.set:
            id: return_on_removal_enabled
            value: "true"
    turn_off_action:
      then:
        - globals.set:
            id: return_on_removal_enabled
            value: "false"

  - platform: template
    name: "Swipe Gestures"
    id: sw_swipe_enabled
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      then:
        - lambda: id(grind_ctrl).set_swipe_enabled(true);
    turn_off_action:
      then:
        - lambda: id(grind_ctrl).set_swipe_enabled(false);

  # Screen on/off — uses lvgl.pause/.resume since the AMOLED has no backlight
  # pin. Pause stops drawing and the panel goes pure black (zero pixel power).
  - platform: template
    name: "Screen"
    id: screen_switch
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    turn_on_action:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lambda: 'id(last_touch_ms) = millis();'
    turn_off_action:
      - lvgl.pause:
          show_snow: false

# ── Interval: update UI labels every 250 ms ───────────────────────────────────
interval:
  - interval: 250ms
    then:
      # Live label/arc updates use lvgl actions so they take the LVGL lock.
      - lvgl.label.update:
          id: lbl_ready_weight
          text: !lambda 'return str_sprintf("%.1fg", id(grind_ctrl).get_current_weight());'
      - if:
          condition:
            lambda: 'return id(grind_ctrl).is_active();'
          then:
            - lvgl.label.update:
                id: lbl_grind_weight
                text: !lambda 'return str_sprintf("%.1fg", id(grind_ctrl).get_current_weight());'
            - lvgl.label.update:
                id: lbl_phase
                text: !lambda 'return std::string(id(grind_ctrl).get_phase_name());'
            - lvgl.arc.update:
                id: arc_progress
                value: !lambda 'return id(grind_ctrl).get_progress_percent();'
            # Button visibility on completion (split-button OK + PULSE)
            - if:
                condition:
                  lambda: 'return id(grind_ctrl).is_completed();'
                then:
                  - lvgl.widget.show: btn_grind_ok
                  - lvgl.widget.hide: btn_grind_stop
                  - if:
                      condition:
                        lambda: 'return id(grind_ctrl).can_pulse();'
                      then:
                        - lvgl.widget.show: btn_grind_pulse
                      else:
                        - lvgl.widget.hide: btn_grind_pulse
                else:
                  - lvgl.widget.hide: btn_grind_ok
                  - lvgl.widget.hide: btn_grind_pulse
                  - lvgl.widget.show: btn_grind_stop
      # Diagnostics live values
      - lvgl.label.update:
          id: lbl_diag_latency
          text: !lambda 'return str_sprintf("Motor latency: %.1fms", id(grind_ctrl).get_motor_latency());'
      - lvgl.label.update:
          id: lbl_diag_mech
          text: !lambda 'return str_sprintf("Mech. events: %d", id(grind_ctrl).get_mech_anomaly_count());'
      - lvgl.label.update:
          id: lbl_freshness
          text: !lambda 'return str_sprintf("%.0fh", id(grind_ctrl).get_freshness_hours());'
      - lvgl.label.update:
          id: lbl_cal_weight
          text: !lambda 'return str_sprintf("%.1fg", id(grind_ctrl).get_current_weight());'
      - lvgl.label.update:
          id: lbl_autotune_latency
          text: !lambda 'return str_sprintf("Current: %.1fms", id(grind_ctrl).get_motor_latency());'

  # Auto-grind on cup placement (weight delta > 50g within rearm window)
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: |-
              if (!id(auto_grind_enabled) || id(grind_ctrl).is_active()) {
                id(auto_grind_trigger_weight) = id(grind_ctrl).get_current_weight();
                return false;
              }
              float cw = id(grind_ctrl).get_current_weight();
              uint32_t now = millis();
              bool fire = false;
              if (cw > id(auto_grind_trigger_weight) + 50.0f) {
                uint32_t last = id(auto_grind_last_trigger_ms);
                if (last == 0 || (now - last) > 1500) {
                  id(auto_grind_last_trigger_ms) = now;
                  fire = true;
                }
              }
              id(auto_grind_trigger_weight) = cw;
              return fire;
          then:
            - lambda: |-
                ESP_LOGI("auto_grind", "Cup placed (delta>50g), triggering grind");
                if (id(sel_grind_mode).state == "Weight")
                  id(grind_ctrl).start_grind_weight(id(num_target_weight).state);
                else
                  id(grind_ctrl).start_grind_time(id(num_target_time).state);
            - lvgl.page.show: page_grinding

  # Return to ready after grind completed + cup removed
  - interval: 1000ms
    then:
      - if:
          condition:
            lambda: |-
              if (!id(return_on_removal_enabled)) return false;
              if (!id(grind_ctrl).is_completed()) return false;
              return id(grind_ctrl).get_current_weight() < 5.0f;
          then:
            - lambda: 'id(grind_ctrl).stop_grind();'
            - lvgl.page.show: page_ready

  # Screen auto-off: when touchscreen has been idle for `screen_timeout`
  # seconds, lvgl.pause to blank. Touch wakes via the on_touch handler.
  # Suppressed during an active grind so the screen never blanks mid-shot.
  - interval: 2s
    then:
      - if:
          condition:
            and:
              - lambda: |-
                  if (id(screen_timeout).state <= 0) return false;
                  if (id(grind_ctrl).is_active()) return false;
                  uint32_t last = id(last_touch_ms);
                  if (last == 0) { id(last_touch_ms) = millis(); return false; }
                  uint32_t idle_ms = millis() - last;
                  return idle_ms >= (uint32_t)id(screen_timeout).state * 1000u;
              - lvgl.is_idle:
                  timeout: 1s
              - not: lvgl.is_paused
          then:
            - lvgl.pause:
                show_snow: false
            - lambda: 'ESP_LOGI("display", "Auto-off after %.0f s idle", id(screen_timeout).state);'

# ── Version / build info ──────────────────────────────────────────────────────
text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true

  - platform: wifi_info
    ip_address:
      name: "IP Address"
