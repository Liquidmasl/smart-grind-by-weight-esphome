################################################################################
# automations.yaml — scripts, sensor callbacks, auto-grind, screen refresh
################################################################################

# ── Globals for UI state ──────────────────────────────────────────────────────
globals:
  - id: active_profile
    type: int
    restore_value: true
    initial_value: "0"

  - id: auto_grind_enabled
    type: bool
    restore_value: true
    initial_value: "true"

  - id: return_on_removal_enabled
    type: bool
    restore_value: true
    initial_value: "true"

  - id: auto_grind_last_trigger_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: auto_grind_trigger_weight
    type: float
    restore_value: false
    initial_value: "0.0"

  - id: grind_phase_prev
    type: std::string
    restore_value: false
    initial_value: '"IDLE"'

# ── HA-exposed numbers (writable from dashboard / automations) ────────────────
number:
  - platform: template
    name: "Target Weight (g)"
    id: num_target_weight
    min_value: 5
    max_value: 1000
    step: 0.1
    unit_of_measurement: g
    mode: box
    restore_value: true
    initial_value: 18.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_target_weight(x);

  - platform: template
    name: "Target Time (s)"
    id: num_target_time
    min_value: 0.5
    max_value: 25
    step: 0.1
    unit_of_measurement: s
    mode: box
    restore_value: true
    initial_value: 10.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_target_time_s(x);

  - platform: template
    name: "Motor Latency (ms)"
    id: num_motor_latency
    min_value: 30
    max_value: 300
    step: 1
    unit_of_measurement: ms
    mode: box
    restore_value: false
    optimistic: true
    set_action:
      then:
        - lambda: id(grind_ctrl).set_motor_latency_ms(x);

  - platform: template
    name: "Calibration Factor"
    id: num_cal_factor
    min_value: -50000
    max_value: 50000
    step: 1
    mode: box
    restore_value: false
    optimistic: true
    set_action:
      then:
        - lambda: id(grind_ctrl).set_cal_factor(x);

  - platform: template
    name: "Freshness Hours"
    id: num_freshness_hours
    min_value: 0.5
    max_value: 72
    step: 0.5
    unit_of_measurement: h
    mode: box
    restore_value: true
    initial_value: 8.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_freshness_hours(x);

  - platform: template
    name: "Purge Amount (g)"
    id: num_purge_amount
    min_value: 0.1
    max_value: 2.5
    step: 0.1
    unit_of_measurement: g
    mode: box
    restore_value: true
    initial_value: 1.0
    set_action:
      then:
        - lambda: id(grind_ctrl).set_chute_amount_g(x);

# ── HA-exposed selects ────────────────────────────────────────────────────────
select:
  - platform: template
    name: "Grind Mode"
    id: sel_grind_mode
    options:
      - "Weight"
      - "Time"
    restore_value: true
    initial_option: "Weight"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            int m = (x == "Time") ? 1 : 0;
            id(grind_ctrl).set_grind_mode(m);

  - platform: template
    name: "Chute Mode"
    id: sel_chute_mode
    options:
      - "Prime"
      - "Purge"
    restore_value: true
    initial_option: "Purge"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            int m = (x == "Purge") ? 1 : 0;
            id(grind_ctrl).set_chute_mode(m);

# ── HA-exposed buttons ────────────────────────────────────────────────────────
button:
  - platform: template
    name: "Tare Scale"
    on_press:
      then:
        - lambda: id(grind_ctrl).request_tare();

  - platform: template
    name: "Start Grind"
    on_press:
      then:
        - lambda: |-
            if (id(sel_grind_mode).state == "Weight")
              id(grind_ctrl).start_grind_weight(id(num_target_weight).state);
            else
              id(grind_ctrl).start_grind_time(id(num_target_time).state);

  - platform: template
    name: "Stop Grind"
    on_press:
      then:
        - lambda: id(grind_ctrl).stop_grind();

  - platform: template
    name: "Additional Pulse"
    on_press:
      then:
        - lambda: id(grind_ctrl).start_additional_pulse();

  - platform: template
    name: "Continue from Purge"
    on_press:
      then:
        - lambda: id(grind_ctrl).continue_from_purge();

  - platform: template
    name: "Start Calibration"
    on_press:
      then:
        - lambda: id(grind_ctrl).start_calibration(100.0f);

  - platform: template
    name: "Start Autotune"
    on_press:
      then:
        - lambda: id(grind_ctrl).start_autotune();

# ── HA-exposed switches ───────────────────────────────────────────────────────
switch:
  - platform: template
    name: "Auto Grind on Cup"
    id: sw_auto_grind
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      then:
        - globals.set:
            id: auto_grind_enabled
            value: "true"
    turn_off_action:
      then:
        - globals.set:
            id: auto_grind_enabled
            value: "false"

  - platform: template
    name: "Return on Removal"
    id: sw_return_on_removal
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    turn_on_action:
      then:
        - globals.set:
            id: return_on_removal_enabled
            value: "true"
    turn_off_action:
      then:
        - globals.set:
            id: return_on_removal_enabled
            value: "false"

  - platform: template
    name: "Swipe Gestures"
    id: sw_swipe_enabled
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      then:
        - lambda: id(grind_ctrl).set_swipe_enabled(true);
    turn_off_action:
      then:
        - lambda: id(grind_ctrl).set_swipe_enabled(false);

# ── Interval: update UI labels every 250 ms ───────────────────────────────────
interval:
  - interval: 250ms
    then:
      - lambda: |-
          // Ready page — live weight
          auto w_str = str_sprintf("%.1fg", id(grind_ctrl).get_current_weight());
          id(lbl_ready_weight).set_text(w_str.c_str());

          // Grinding page — live weight + phase + progress
          if (id(grind_ctrl).is_active()) {
            auto gw_str = str_sprintf("%.1fg", id(grind_ctrl).get_current_weight());
            id(lbl_grind_weight).set_text(gw_str.c_str());
            id(lbl_phase).set_text(id(grind_ctrl).get_phase_name());
            id(arc_progress).set_value(id(grind_ctrl).get_progress_percent());

            // Show/hide OK and PULSE buttons based on state
            bool completed = id(grind_ctrl).is_completed();
            id(btn_grind_ok).set_hidden(!completed);
            id(btn_grind_pulse).set_hidden(!(completed && id(grind_ctrl).can_pulse()));
            id(btn_grind_stop).set_hidden(completed);

            // Auto-navigate to purge confirm page
            if (id(grind_ctrl).is_purge_confirm()) {
              lv_scr_load(id(page_purge_confirm));
            }
          }

          // Diagnostics page
          auto lat_str = str_sprintf("Motor latency: %.1fms", id(grind_ctrl).get_motor_latency());
          id(lbl_diag_latency).set_text(lat_str.c_str());

  # Auto-grind on cup placement (weight delta > 50g within 5s)
  - interval: 500ms
    then:
      - lambda: |-
          if (!id(auto_grind_enabled) || id(grind_ctrl).is_active()) return;
          float cw = id(grind_ctrl).get_current_weight();
          uint32_t now = millis();
          // Detect rising edge (cup placed)
          if (cw > id(auto_grind_trigger_weight) + 50.0f) {
            uint32_t last = id(auto_grind_last_trigger_ms);
            if (last == 0 || (now - last) > 1500) {
              id(auto_grind_last_trigger_ms) = now;
              ESP_LOGI("auto_grind", "Cup placed (delta>50g), triggering grind");
              if (id(sel_grind_mode).state == "Weight")
                id(grind_ctrl).start_grind_weight(id(num_target_weight).state);
              else
                id(grind_ctrl).start_grind_time(id(num_target_time).state);
              lv_scr_load(id(page_grinding));
            }
          }
          id(auto_grind_trigger_weight) = cw;

  # Return to ready after grind completed + cup removed
  - interval: 1000ms
    then:
      - lambda: |-
          if (!id(return_on_removal_enabled)) return;
          if (!id(grind_ctrl).is_completed()) return;
          // If weight drops back below a threshold after completion, navigate home
          float cw = id(grind_ctrl).get_current_weight();
          if (cw < 5.0f) {
            id(grind_ctrl).stop_grind();
            lv_scr_load(id(page_ready));
          }

# ── Version / build info ──────────────────────────────────────────────────────
text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true

  - platform: wifi_info
    ip_address:
      name: "IP Address"
