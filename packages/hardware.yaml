################################################################################
# hardware.yaml — GPIO, I2C, display, touch, weight sensor, motor
################################################################################

# ── I2C for FT3168 capacitive touch ───────────────────────────────────────────
i2c:
  - id: i2c_touch
    sda: GPIO47
    scl: GPIO48
    frequency: 400kHz
    # ACK-checking disabled; idle NACKs flood logs when no finger present
    scan: false

# ── Weight sensor custom component ────────────────────────────────────────────
# Owns the HX711 directly and provides the full filtering + flow-rate API
# consumed by grind_controller.
weight_sensor:
  id: weight_sensor_component
  dout_pin: GPIO3
  clk_pin: GPIO2
  # Sign here depends on load-cell wiring; flip if readings are negative.
  # 7050 magnitude is the original firmware's USER_DEFAULT_CALIBRATION_FACTOR.
  calibration_factor: 7050.0
  sample_rate_sps: 10           # HW_LOADCELL_SAMPLE_RATE_SPS

# ── Grind controller custom component ─────────────────────────────────────────
grind_controller:
  id: grind_ctrl
  weight_sensor: weight_sensor_component
  motor_pin: GPIO18
  motor_settling_time_ms: 500   # HW_GRINDER_SETTLING_TIME_MS

  # ── HA-visible sensor outputs ────────────────────────────────────────────
  current_weight_sensor:
    name: "Grind Weight"
    unit_of_measurement: g
    accuracy_decimals: 1
    icon: mdi:scale
  flow_rate_sensor:
    name: "Flow Rate"
    unit_of_measurement: "g/s"
    accuracy_decimals: 2
    icon: mdi:speedometer
  phase_name_sensor:
    name: "Grind Phase"
    icon: mdi:state-machine
    on_value:
      # Navigate to the purge-confirm page when the controller pauses for purge
      - if:
          condition:
            lambda: 'return x == "PURGE_CONFIRM";'
          then:
            - lvgl.page.show: page_purge_confirm
      # Fire HA events at start-of-grind and completion for analytics
      - if:
          condition:
            lambda: 'return x == "INITIALIZING";'
          then:
            - homeassistant.event:
                event: esphome.grind_started
                data_template:
                  profile_id: !lambda 'return std::to_string(id(grind_ctrl).get_current_profile_id());'
                  target_g: !lambda 'return std::to_string(id(grind_ctrl).get_target_weight());'
                  mode: !lambda 'return id(grind_ctrl).get_grind_mode() == 1 ? "time" : "weight";'
      - if:
          condition:
            lambda: 'return x == "COMPLETED";'
          then:
            - homeassistant.event:
                event: esphome.grind_completed
                data_template:
                  profile_id: !lambda 'return std::to_string(id(grind_ctrl).get_current_profile_id());'
                  target_g: !lambda 'return std::to_string(id(grind_ctrl).get_target_weight());'
                  final_g: !lambda 'return std::to_string(id(grind_ctrl).get_final_weight());'
                  error_g: !lambda |-
                    float e = id(grind_ctrl).get_grind_mode() == 0
                              ? id(grind_ctrl).get_final_weight() - id(grind_ctrl).get_target_weight()
                              : 0.0f;
                    return std::to_string(e);
                  pulse_count: !lambda 'return std::to_string(id(grind_ctrl).get_pulse_attempts());'
                  duration_ms: !lambda 'return std::to_string(id(grind_ctrl).get_grind_duration_ms());'
                  mode: !lambda 'return id(grind_ctrl).get_grind_mode() == 1 ? "time" : "weight";'
  progress_sensor:
    name: "Grind Progress"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: mdi:progress-clock
  pulse_count_sensor:
    name: "Pulse Count"
    accuracy_decimals: 0
  last_grind_error_sensor:
    name: "Last Grind Error"
    unit_of_measurement: g
    accuracy_decimals: 2
  last_grind_duration_sensor:
    name: "Last Grind Duration"
    unit_of_measurement: ms
    accuracy_decimals: 0
  last_grind_final_weight_sensor:
    name: "Last Grind Final Weight"
    unit_of_measurement: g
    accuracy_decimals: 1
  mechanical_anomaly_sensor:
    name: "Mechanical Anomalies"
    accuracy_decimals: 0
  is_calibrated_sensor:
    name: "Load Cell Calibrated"
  motor_latency_sensor:
    name: "Motor Latency"
    unit_of_measurement: ms
    accuracy_decimals: 1

# ── Touchscreen — FT3168 (FT5x06 register-compatible) ────────────────────────
# The Waveshare 1.64" AMOLED carries an FT3168 capacitive touch IC. It speaks
# the FT5x06 register set, so ESPHome's built-in `ft5x06` platform drives it
# directly at I2C 0x38. Gesture (swipe) detection is handled in LVGL.
touchscreen:
  - platform: ft5x06
    id: main_touch
    i2c_id: i2c_touch
    address: 0x38
    transform:
      mirror_x: true
      mirror_y: true
      swap_xy: false
    on_touch:
      - lambda: |-
          ESP_LOGD("touch", "touch at x=%d y=%d", touch.x, touch.y);
          id(last_touch_ms) = millis();

# ── Display — Waveshare 1.64" AMOLED (CO5300 via QSPI) ───────────────────────
# Uses ESPHome's built-in mipi_spi platform with the bundled CO5300 init
# sequence (added in ESPHome 2025.8). The platform's CO5300 defaults are tuned
# for the 466x466 sibling panel; the 1.64" 280x456 module needs the dimensions
# override below plus offset_width/offset_height tuning if the image lands
# off-center on first boot (typical green-line / shift symptom).
spi:
  - id: qspi_display_bus
    type: quad
    clk_pin: GPIO10
    data_pins: [GPIO11, GPIO12, GPIO13, GPIO14]

display:
  - platform: mipi_spi
    id: main_display
    model: CO5300
    spi_id: qspi_display_bus
    bus_mode: quad
    cs_pin: GPIO9
    reset_pin: GPIO21
    dimensions:
      width: 280
      height: 456
      # Iterate visually if image is shifted or shows a green strip.
      # CO5300 esp_lcd driver defaults to CASET start = 0x16 = 22.
      # Try sequentially: 22 → 6 → 0 → other values, watching where the
      # image lands. Adjust offset_height if there's a vertical shift too.
      offset_width: 22
      offset_height: 0
    data_rate: 40MHz
    color_depth: 16
    invert_colors: false
    transform:
      mirror_x: true
      mirror_y: true
      swap_xy: false
    update_interval: never  # LVGL drives refresh
    auto_clear_enabled: false

# ── LVGL fonts ────────────────────────────────────────────────────────────────
# Most text uses LVGL's built-in Montserrat fonts (montserrat_24/32/36/48),
# referenced from ui.yaml as `text_font: montserrat_24` etc.
# The ready/grinding screens use a custom 60pt for the big weight number — this
# matches the original (which enabled lv_font_montserrat_60 in its lv_conf.h).
# We subset the glyph set to digits + 'g s . - ' to keep flash usage tiny.
font:
  - file: "fonts/Montserrat-Regular.ttf"
    id: font_weight_display
    size: 60
    bpp: 4
    glyphs: "0123456789.gs- "
