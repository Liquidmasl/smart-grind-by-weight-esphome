################################################################################
# Smart Grind-by-Weight — ESPHome main configuration
# Hardware: Waveshare ESP32-S3 1.64" AMOLED + HX711 + motor relay
################################################################################

esphome:
  name: smart-grinder
  friendly_name: Smart Grinder

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
  flash_size: 16MB

# Waveshare 1.64" AMOLED module ships PSRAM; LVGL framebuffer needs it.
psram:
  mode: octal
  speed: 80MHz

# ── Custom components ──────────────────────────────────────────────────────────
# Paths are prefixed with the repo subfolder name because grinder.yaml is
# symlinked one level up into /config/esphome/ and ESPHome resolves includes
# relative to the symlink location, not the real file. If you rename the
# cloned directory, update the four occurrences below.
external_components:
  - source: smart-grind-by-weight-esphome/components
    components: [grind_controller, weight_sensor, ft3168_touch]

# ── Package includes ───────────────────────────────────────────────────────────
packages:
  hardware:    !include smart-grind-by-weight-esphome/packages/hardware.yaml
  ui:          !include smart-grind-by-weight-esphome/packages/ui.yaml
  automations: !include smart-grind-by-weight-esphome/packages/automations.yaml

# ── Connectivity ───────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "SmartGrinder Fallback"
    password: !secret ap_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# ── Logging ────────────────────────────────────────────────────────────────────
logger:
  level: INFO
  logs:
    # Mute the per-publish sensor state lines; we have HA history for that.
    sensor: WARN

# ── Time ───────────────────────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
