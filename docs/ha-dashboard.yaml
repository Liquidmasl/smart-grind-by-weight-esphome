# ──────────────────────────────────────────────────────────────────────────────
# Smart Grinder — Home Assistant Dashboard
#
# How to use:
#   Settings → Dashboards → "+ Add dashboard" → "From scratch" → name it →
#   open it → 3-dot menu → "Edit dashboard" → 3-dot menu → "Raw configuration
#   editor" → replace everything with this file → Save.
#
# Required (HACS):
#   - apexcharts-card    https://github.com/RomRider/apexcharts-card
#
# Entity IDs assume device name "smart-grinder". If yours differs, find-and-
# replace `smart_grinder` with your device name from Settings → Devices.
# ──────────────────────────────────────────────────────────────────────────────

title: Smart Grinder
views:
  - title: Grinder
    icon: mdi:coffee-maker
    path: grinder
    type: sections
    max_columns: 2
    sections:

      # ──────────────────────────────────────────────────────────────────
      # SECTION 1 — Live status  (full width)
      # ──────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Live
            heading_style: title
            icon: mdi:chart-line-variant

          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.smart_grinder_grind_weight
                name: Weight
                unit: g
                min: 0
                max: 30
                needle: true
                severity:
                  green: 0
                  yellow: 20
                  red: 27
              - type: gauge
                entity: sensor.smart_grinder_grind_progress
                name: Progress
                unit: "%"
                min: 0
                max: 100
                needle: true
                severity:
                  green: 0
                  yellow: 75
                  red: 95
              - type: gauge
                entity: sensor.smart_grinder_flow_rate
                name: Flow
                unit: g/s
                min: 0
                max: 4
                needle: true
                severity:
                  green: 0.3
                  yellow: 2.5
                  red: 3.5

          - type: tile
            entity: sensor.smart_grinder_grind_phase
            name: Phase
            icon: mdi:state-machine
            color: primary
            state_color: true

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.smart_grinder_grind_phase
                state_not: IDLE
            card:
              type: custom:apexcharts-card
              header:
                show: true
                title: Live grind
                show_states: true
              graph_span: 60s
              update_interval: 500ms
              span:
                end: minute
              apex_config:
                chart:
                  background: transparent
                  height: 220
                grid:
                  borderColor: var(--divider-color)
              all_series_config:
                stroke_width: 2
              series:
                - entity: sensor.smart_grinder_grind_weight
                  name: Weight
                  color: "#FF6D00"
                  unit: g
                  type: line
                - entity: sensor.smart_grinder_flow_rate
                  name: Flow
                  color: "#29B6F6"
                  unit: g/s
                  type: line
                  yaxis_id: flow
              yaxis:
                - id: weight
                  decimals: 1
                - id: flow
                  opposite: true
                  decimals: 2

      # ──────────────────────────────────────────────────────────────────
      # SECTION 2 — Quick actions
      # ──────────────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Quick actions
            heading_style: title
            icon: mdi:gesture-tap-button

          - type: heading
            heading: Grind profiles
            heading_style: subtitle

          # Buttons trigger the firmware-side preset grind actions.
          # Gram values come from the Profile presets in Settings below.
          - type: horizontal-stack
            cards:
              - type: button
                entity: button.smart_grinder_grind_single
                name: Single
                icon: mdi:coffee-outline
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_grind_single
              - type: button
                entity: button.smart_grinder_grind_double
                name: Double
                icon: mdi:coffee
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_grind_double
              - type: button
                entity: button.smart_grinder_grind_custom
                name: Custom
                icon: mdi:coffee-to-go
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_grind_custom

          - type: heading
            heading: Controls
            heading_style: subtitle

          - type: horizontal-stack
            cards:
              - type: button
                entity: button.smart_grinder_tare_scale
                name: Tare
                icon: mdi:scale-balance
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_tare_scale
              - type: button
                entity: button.smart_grinder_stop_grind
                name: Stop
                icon: mdi:stop-circle-outline
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_stop_grind
              - type: button
                entity: button.smart_grinder_additional_pulse
                name: Pulse
                icon: mdi:lightning-bolt
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_additional_pulse
              - type: button
                entity: button.smart_grinder_continue_from_purge
                name: Continue
                icon: mdi:play-circle-outline
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_continue_from_purge

      # ──────────────────────────────────────────────────────────────────
      # SECTION 3 — Last shot
      # ──────────────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Last shot
            heading_style: title
            icon: mdi:check-circle-outline

          - type: horizontal-stack
            cards:
              - type: tile
                entity: sensor.smart_grinder_last_grind_final_weight
                name: Final weight
                icon: mdi:scale
                color: blue
              - type: tile
                entity: sensor.smart_grinder_last_grind_error
                name: Error
                icon: mdi:plus-minus
                color: orange

          - type: horizontal-stack
            cards:
              - type: tile
                entity: sensor.smart_grinder_last_grind_duration
                name: Duration
                icon: mdi:timer-outline
                color: green
              - type: tile
                entity: sensor.smart_grinder_pulse_count
                name: Pulses
                icon: mdi:lightning-bolt
                color: purple

          # Combined weight + error history — weight as bars, error as line on
          # the right axis so both fit without one dwarfing the other.
          - type: custom:apexcharts-card
            header:
              show: true
              title: Shot history (last 24 h)
              show_states: false
            graph_span: 24h
            span:
              end: minute
            apex_config:
              chart:
                height: 230
                background: transparent
              grid:
                borderColor: var(--divider-color)
            series:
              - entity: sensor.smart_grinder_last_grind_final_weight
                name: Final weight
                color: "#29B6F6"
                type: column
                group_by:
                  func: last
                  duration: 1m
                stroke_width: 0
              - entity: sensor.smart_grinder_last_grind_error
                name: Error
                color: "#FF6D00"
                type: line
                group_by:
                  func: last
                  duration: 1m
                stroke_width: 2
                yaxis_id: error
            yaxis:
              - id: weight
                decimals: 1
              - id: error
                opposite: true
                decimals: 2

      # ──────────────────────────────────────────────────────────────────
      # SECTION 4 — Settings  (full width, 2×2 grid of entity groups)
      # ──────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Settings
            heading_style: title
            icon: mdi:tune

          - type: horizontal-stack
            cards:
              - type: entities
                title: Targets
                entities:
                  - entity: select.smart_grinder_grind_mode
                    name: Mode
                  - entity: number.smart_grinder_target_weight_g
                    name: Target weight
                  - entity: number.smart_grinder_target_time_s
                    name: Target time

              - type: entities
                title: Profile presets
                entities:
                  - entity: number.smart_grinder_preset_single_g
                    name: Single
                  - entity: number.smart_grinder_preset_double_g
                    name: Double
                  - entity: number.smart_grinder_preset_custom_g
                    name: Custom

          - type: horizontal-stack
            cards:
              - type: entities
                title: Purge & freshness
                entities:
                  - entity: select.smart_grinder_chute_mode
                    name: Chute mode
                  - entity: number.smart_grinder_purge_amount_g
                    name: Purge amount
                  - entity: number.smart_grinder_freshness_hours
                    name: Freshness window

              - type: entities
                title: Behaviour & display
                entities:
                  - entity: switch.smart_grinder_auto_grind_on_cup
                    name: Auto-grind on cup placed
                  - entity: switch.smart_grinder_return_on_removal
                    name: Return to ready on removal
                  - entity: switch.smart_grinder_swipe_gestures
                    name: Swipe gestures
                  - entity: switch.smart_grinder_screen
                    name: Screen on/off
                  - entity: number.smart_grinder_screen_timeout
                    name: Screen auto-off

      # ──────────────────────────────────────────────────────────────────
      # SECTION 5 — Calibration & tuning
      # ──────────────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Calibration & tuning
            heading_style: title
            icon: mdi:scale-balance

          - type: entities
            title: Scale calibration
            entities:
              - entity: binary_sensor.smart_grinder_load_cell_calibrated
                name: Calibrated
              - entity: number.smart_grinder_calibration_reference_weight_g
                name: Reference weight
              - entity: number.smart_grinder_calibration_factor
                name: Cal factor (advanced)

          - type: horizontal-stack
            cards:
              - type: button
                entity: button.smart_grinder_tare_scale
                name: Tare
                icon: mdi:scale-balance
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_tare_scale
              - type: button
                entity: button.smart_grinder_start_calibration
                name: Calibrate
                icon: mdi:check-decagram
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.smart_grinder_start_calibration

          - type: entities
            title: Motor tuning
            entities:
              - entity: number.smart_grinder_motor_latency_ms
                name: Motor latency
              - entity: button.smart_grinder_start_autotune
                name: Auto-tune motor

      # ──────────────────────────────────────────────────────────────────
      # SECTION 6 — Diagnostics
      # ──────────────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Diagnostics
            heading_style: title
            icon: mdi:stethoscope

          - type: entities
            entities:
              - entity: binary_sensor.smart_grinder_load_cell_calibrated
                name: Load cell calibrated
              - entity: sensor.smart_grinder_mechanical_anomalies
                name: Mechanical anomalies
              - entity: sensor.smart_grinder_motor_latency
                name: Motor response latency
              - entity: sensor.smart_grinder_grind_phase
                name: Current phase

          - type: custom:apexcharts-card
            header:
              show: true
              title: Mechanical anomalies (last 7 d)
            graph_span: 7d
            apex_config:
              chart:
                background: transparent
              grid:
                borderColor: var(--divider-color)
            series:
              - entity: sensor.smart_grinder_mechanical_anomalies
                name: Anomalies
                color: "#FFA726"
                type: area
                stroke_width: 2
                fill_raw: origin
